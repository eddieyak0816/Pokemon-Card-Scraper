name: Generate CSVs

on:
  schedule:
    - cron: '49 15 * * *' # daily at 11:49 AM Eastern (15:49 UTC during DST)
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run generator
        run: |
          python "${{ github.workspace }}/scripts/generate_all_csvs_urls.py"

      - name: Commit and push CSV changes, open PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH=update-csvs-$(date +%s)
          git checkout -b "$BRANCH"
          git add csv_new || true
          if git diff --staged --quiet; then
            echo "No CSV changes to commit"
            exit 0
          fi
          git commit -m "Update generated CSVs"
          git push --set-upstream origin "$BRANCH"

          # create PR via REST API
          BODY=$(jq -n --arg b "$BRANCH" '{title: "Update generated CSVs", head: $b, base: "main", body: "Automated CSV update"}')
          curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/repos/$REPO/pulls -d "$BODY"

name: Generate CSVs

on:
  schedule:
    - cron: '49 15 * * *' # daily at 11:49 AM Eastern (15:49 UTC during DST)
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run generator
        run: |
          python "${{ github.workspace }}/scripts/generate_csvs_from_repo.py"

      - name: Commit and push CSV changes, open PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH=update-csvs-$(date +%s)
          git checkout -b "$BRANCH"
          git add csv_new || true
          if git diff --staged --quiet; then
            echo "No CSV changes to commit"
            # write empty pr_info so notify step knows no PR was made
            mkdir -p artifacts || true
            echo '{"pr_url": null, "branch": null}' > artifacts/pr_info.json
            exit 0
          fi
          git commit -m "Update generated CSVs"
          git push --set-upstream origin "$BRANCH"

          # create PR via REST API
          BODY=$(jq -n --arg b "$BRANCH" '{title: "Update generated CSVs", head: $b, base: "main", body: "Automated CSV update"}')
          RESP=$(curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/repos/$REPO/pulls -d "$BODY")
          PR_URL=$(echo "$RESP" | jq -r .html_url)
          mkdir -p artifacts || true
          echo "{\"pr_url\": \"$PR_URL\", \"branch\": \"$BRANCH\"}" > artifacts/pr_info.json

      - name: Notify via Telegram
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          ART=artifacts/new_csvs.json
          PR_INFO=artifacts/pr_info.json

          # if artifact missing, still notify as 'No new sets found.' to keep clarity
          if [ ! -f "$ART" ]; then
            MESSAGE="No new sets found."
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" -d chat_id="${TELEGRAM_CHAT_ID}" -d text="$MESSAGE"
            exit 0
          fi

          NEW_COUNT=$(jq '.new_csvs | length' $ART)
          if [ "$NEW_COUNT" -eq 0 ]; then
            MESSAGE="No new sets found."
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" -d chat_id="${TELEGRAM_CHAT_ID}" -d text="$MESSAGE"
            exit 0
          fi

          # load PR info if present
          BRANCH=$(jq -r '.branch // empty' $PR_INFO 2>/dev/null || echo "")
          PR_URL=$(jq -r '.pr_url // empty' $PR_INFO 2>/dev/null || echo "")

          BASE_RAW_URL="https://raw.githubusercontent.com/$REPO"
          TARGET_BRANCH="$BRANCH"
          if [ -z "$TARGET_BRANCH" ] || [ "$TARGET_BRANCH" = "null" ]; then
            TARGET_BRANCH="main"
          fi

          # build plain set-name lines with links
          LINES="New sets found:\n"
          for i in $(jq -r '.new_csvs[] | @base64' $ART); do
            _jq() { echo ${i} | base64 --decode | jq -r ${1}; }
            csvfile=$(_jq '.csv')
            setname=$(_jq '.set_name')
            url="$BASE_RAW_URL/$TARGET_BRANCH/csv_new/$csvfile"
            LINES="$LINES$setname: $url\n"
          done

          if [ -n "$PR_URL" ] && [ "$PR_URL" != "null" ]; then
            LINES="$LINES\nPR: $PR_URL"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" -d chat_id="${TELEGRAM_CHAT_ID}" -d text="$LINES"
